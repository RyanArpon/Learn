<div class="row">
  <div class="col-md-12">
    <h2>
      Add Question
    </h2>
    <div class="form-container">
      <mat-form-field>
        <mat-select placeholder="Select Topic" [formControl]="topic">
          <mat-option *ngFor="let topic of topics" [value]="topic.id">
            {{topic.title}}
          </mat-option>
        </mat-select>
      </mat-form-field>

      <mat-form-field>
        <textarea matInput placeholder="Question" [formControl]="question"></textarea>
      </mat-form-field>

      <div mat-dialog-actions>
        <button mat-button mat-raised-button (click)="onSubmit()" class="blue-bg white">Submit</button>
        <button mat-button mat-raised-button (click)="onNoClick()" class="red-bg white">Cancel</button>
      </div>
    </div>
  </div>
</div>
