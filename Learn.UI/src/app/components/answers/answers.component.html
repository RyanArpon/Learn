<!--The content below is only a placeholder and can be replaced.-->
<div>
  <mat-card class="home-card">
    <mat-card-content>
      <div>
        <h1>
          Answers
        </h1>
        <hr>
        <br>

        <div class="table-container mat-elevation-z8">
          <table mat-table [dataSource]="dataSource" matSort class="mat-elevation-z8">
            <!-- Topic Column -->
            <ng-container matColumnDef="description">
              <th mat-header-cell *matHeaderCellDef mat-sort-header> <strong>Description</strong> </th>
              <td mat-cell *matCellDef="let element"> {{element.description}} </td>
            </ng-container>

            <!-- Topic Column -->
            <ng-container matColumnDef="isCorrect">
              <th mat-header-cell *matHeaderCellDef mat-sort-header class="text-center"> <strong>Correct Answer</strong>
              </th>
              <td mat-cell *matCellDef="let element" class="text-center">
                <mat-icon *ngIf="element.isCorrect; isIncorrect" class="green" matTooltip="Yes">check_circle</mat-icon>

                <ng-template #isIncorrect>
                  <mat-icon class="red" matTooltip="No">cancel</mat-icon>
                </ng-template>
              </td>
            </ng-container>

            <!-- Action Column -->
            <ng-container matColumnDef="action">
              <th mat-header-cell *matHeaderCellDef mat-sort-header class="text-center"> <strong>Action</strong> </th>
              <td mat-cell *matCellDef="let element" class="text-center">
                <button class="plain" (click)="onEdit(element.id, element.title)"><mat-icon class="blue"
                    matTooltip="Edit">edit</mat-icon></button>
                <button class="plain" (click)="onDelete(element.id, element.title)"><mat-icon class="red"
                    matTooltip="Delete">delete</mat-icon></button>
              </td>
            </ng-container>

            <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
            <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
          </table>

          <!-- Paginator -->
          <mat-paginator [pageSizeOptions]="[5, 10, 20]" showFirstLastButtons></mat-paginator>
        </div>
        <br>

        <button mat-raised-button [routerLink]="['/topics']">Topics</button>
        <button mat-raised-button [routerLink]="['/questions']">Questions</button>
        <button mat-raised-button [routerLink]="['/answers']">Answers</button>
      </div>
    </mat-card-content>
  </mat-card>

</div>
