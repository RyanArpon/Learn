<div class="row">
  <div class="col-md-12">
    <h2>
      Add Topic
    </h2>
    <div class="form-container">
      <mat-form-field>
        <textarea matInput placeholder="Topic Title" [formControl]="topic"></textarea>
      </mat-form-field>

      <div mat-dialog-actions>
        <button mat-button mat-raised-button (click)="onSubmit()">Submit</button>
        <button mat-button mat-raised-button (click)="onNoClick()">Cancel</button>
      </div>
    </div>
  </div>
</div>
